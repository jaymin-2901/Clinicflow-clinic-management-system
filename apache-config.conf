<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    # Enable mod_rewrite
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        # Rewrite rules for API routing
        RewriteEngine On
        RewriteBase /

        # Route /api/* to backend-php/api/
        RewriteRule ^api/(.*)$ backend-php/api/$1 [L]

        # Route /uploads/* to public/uploads/
        RewriteRule ^uploads/(.*)$ public/uploads/$1 [L]

        # Route /health check
        RewriteRule ^health$ api/health.php [L]
    </Directory>

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # PHP Settings
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php-fpm.sock|fcgi://localhost/"
    </FilesMatch>
</VirtualHost>
